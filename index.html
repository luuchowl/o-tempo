<!DOCTYPE html>

  <style>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Constants ─────────────────────────────────────────────────────────────────
const MONTHS = [
  '2025-11','2025-12',
  '2026-01','2026-02','2026-03','2026-04','2026-05','2026-06'
];
const MONTH_LABELS = ['Nov','Dec','Jan','Feb','Mar','Apr','May','Jun'];
const HOURS        = [0, 3, 6, 9, 12, 15, 18, 21];
const HOUR_LABELS  = ['0h','3h','6h','9h','12h','15h','18h','21h'];

const GRID_X    = 8;    // hours
const GRID_Z    = 220;  // one slot per day (Nov 1 – Jun 8)
const CELL_Z    = 4 / 7;          // world units per day (4× so bars don't overlap)
const BAR_Z     = CELL_Z * 0.88;  // bar depth (small gap between days)
const MONTH_OFFSETS = [0, 30, 61, 92, 120, 151, 181, 212];
const MONTH_NDAYS   = [30, 31, 31, 28,  31,  30,  31,   8];
const VIEW_HALF = 60;
const BAR_GAP   = 0.92;
const HEIGHT_MIN = 0.6;
const HEIGHT_MAX = 20.0;

const COLOR_COLD  = new THREE.Color('#4fc3f7');
const COLOR_MID   = new THREE.Color('#ffb300');
const COLOR_HOT   = new THREE.Color('#ff5722');
const COLOR_WHITE = new THREE.Color(1, 1, 1);

// ── CSV ───────────────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(';').map(h => h.trim());
  return lines.slice(1).map(line => {
    const vals = line.split(';');
    const row = {};
    headers.forEach((h, i) => { row[h] = vals[i]?.trim(); });
    return row;
  });
}

// ── Aggregation: 8 (hour) × 220 (days) ───────────────────────────────────────
function dayIndex(dt) {
  const month = dt?.slice(0, 7);
  const day   = parseInt(dt?.slice(8, 10) ?? '0', 10);
  const mi    = MONTHS.indexOf(month);
  if (mi === -1) return -1;
  return MONTH_OFFSETS[mi] + day - 1;
}

function buildGrid(rows) {
  const acc = Array.from({ length: GRID_X }, () =>
    Array.from({ length: GRID_Z }, () => ({ sum: 0, n: 0 }))
  );
  for (const row of rows) {
    const dt   = row.date_time;
    const hour = parseInt(dt?.slice(11, 13) ?? '-1', 10);
    const xi   = HOURS.indexOf(hour);
    const zi   = dayIndex(dt);
    if (xi === -1 || zi < 0 || zi >= GRID_Z) continue;
    const temp = parseFloat(row.temperatura);
    if (isNaN(temp)) continue;
    acc[xi][zi].sum += temp;
    acc[xi][zi].n   += 1;
  }
  return acc.map(col => col.map(cell => cell.n > 0 ? cell.sum / cell.n : null));
}

// ── Least Squares polynomial fit ─────────────────────────────────────────────
function polyfit(xs, ys, degree) {
  const n = xs.length;
  const d = degree + 1;
  const A = xs.map(x => Array.from({ length: d }, (_, j) => Math.pow(x, j)));
  const ATA = Array.from({ length: d }, () => new Array(d).fill(0));
  for (let i = 0; i < d; i++)
    for (let j = 0; j < d; j++)
      for (let k = 0; k < n; k++)
        ATA[i][j] += A[k][i] * A[k][j];
  const ATy = new Array(d).fill(0);
  for (let i = 0; i < d; i++)
    for (let k = 0; k < n; k++)
      ATy[i] += A[k][i] * ys[k];
  const M = ATA.map((row, i) => [...row, ATy[i]]);
  for (let col = 0; col < d; col++) {
    let pivot = col;
    for (let row = col + 1; row < d; row++)
      if (Math.abs(M[row][col]) > Math.abs(M[pivot][col])) pivot = row;
    [M[col], M[pivot]] = [M[pivot], M[col]];
    const s = M[col][col];
    for (let j = col; j <= d; j++) M[col][j] /= s;
    for (let row = 0; row < d; row++) {
      if (row === col) continue;
      const f = M[row][col];
      for (let j = col; j <= d; j++) M[row][j] -= f * M[col][j];
    }
  }
  return M.map(row => row[d]);
}

function evalPoly(coeffs, x) {
  return coeffs.reduce((acc, c, i) => acc + c * Math.pow(x, i), 0);
}

// Linearly interpolate the n original samples into N evenly-spaced points
function densePoints(ys, N) {
  const n  = ys.length;
  const xs = [], vals = [];
  for (let i = 0; i < N; i++) {
    const t  = i / (N - 1) * (n - 1);
    const lo = Math.floor(t);
    const hi = Math.min(lo + 1, n - 1);
    const f  = t - lo;
    xs.push(t);
    vals.push(ys[lo] * (1 - f) + ys[hi] * f);
  }
  return { xs, ys: vals };
}

// ── Module-scope data (populated by buildChart) ───────────────────────────────
let grid = null;
let tMin = 0, tMax = 1;

// ── Color ─────────────────────────────────────────────────────────────────────
function tempColor(n) {
  const c = new THREE.Color();
  if (n < 0.5) c.lerpColors(COLOR_COLD, COLOR_MID, n * 2);
  else         c.lerpColors(COLOR_MID, COLOR_HOT, (n - 0.5) * 2);
  return c;
}

// ── Sprite label ──────────────────────────────────────────────────────────────
function makeSprite(text, scale = 1) {
  const canvas = document.createElement('canvas');
  canvas.width  = 128;
  canvas.height = 48;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 128, 48);
  ctx.font = 'bold 26px monospace';
  ctx.fillStyle = 'rgba(200,200,220,0.85)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 64, 24);
  const mat = new THREE.SpriteMaterial({
    map: new THREE.CanvasTexture(canvas),
    transparent: true,
    depthWrite: false,
  });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(1.1 * scale, 0.4 * scale, 1);
  return sprite;
}

// ── Scene ─────────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(devicePixelRatio);
document.body.appendChild(renderer.domElement);
const clock = new THREE.Clock();

const scene = new THREE.Scene();
scene.background = new THREE.Color('#0a0a0f');
scene.fog = new THREE.Fog('#0a0a0f', 200, 350);

const aspect = window.innerWidth / window.innerHeight;
const camera = new THREE.OrthographicCamera(
  -VIEW_HALF * aspect, VIEW_HALF * aspect,
   VIEW_HALF,         -VIEW_HALF,
   0.1, 120
);

// 45° elevation, 45° azimuth, looking at centre of 8×32 grid
const DIST  = 55;
const POLAR = Math.PI / 4;
const AZIM  = Math.PI / 4;
const CX = 4, CZ = GRID_Z * CELL_Z / 2; // grid centre
camera.position.set(
  CX + DIST * Math.sin(POLAR) * Math.sin(AZIM),
  DIST * Math.cos(POLAR),
  CZ + DIST * Math.sin(POLAR) * Math.cos(AZIM)
);
camera.lookAt(CX, 0, CZ);

scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const sun = new THREE.DirectionalLight(0xfff4e0, 1.4);
sun.position.set(14, 20, 14);
scene.add(sun);

// Ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(10, GRID_Z * CELL_Z + 2),
  new THREE.MeshStandardMaterial({ color: '#13132a', roughness: 1 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.set(CX, -0.005, CZ);
scene.add(ground);

// Grid lines: vertical columns + one horizontal per day
const GZW     = GRID_Z * CELL_Z;
const gridMat = new THREE.LineBasicMaterial({ color: '#1a1a35' });
for (let x = 0; x <= GRID_X; x++) {
  const pts = [new THREE.Vector3(x, 0, 0), new THREE.Vector3(x, 0, GZW)];
  scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), gridMat));
}
for (let z = 0; z <= GRID_Z; z++) {
  const zw  = z * CELL_Z;
  const pts = [new THREE.Vector3(0, 0, zw), new THREE.Vector3(GRID_X, 0, zw)];
  scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), gridMat));
}

// Brighter lines at month boundaries
const monthBoundaryMat = new THREE.LineBasicMaterial({ color: '#2e2e5a' });
for (let mi = 0; mi <= 8; mi++) {
  const dayOff = mi < 8 ? MONTH_OFFSETS[mi] : MONTH_OFFSETS[7] + MONTH_NDAYS[7];
  const z   = dayOff * CELL_Z;
  const pts = [new THREE.Vector3(0, 0, z), new THREE.Vector3(GRID_X, 0, z)];
  scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), monthBoundaryMat));
}

// Orbit controls — yaw only
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(CX, 0, CZ);
controls.enablePan  = true;
controls.enableZoom = true;
controls.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.PAN, RIGHT: THREE.MOUSE.PAN };
controls.minPolarAngle = Math.PI * 0.05;
controls.maxPolarAngle = Math.PI * 0.88;
controls.minZoom = 0.25;
controls.maxZoom = 4.0;
controls.update();

// ── Curve plane (shader) ──────────────────────────────────────────────────────
const curveMat = new THREE.ShaderMaterial({
  side: THREE.DoubleSide,
  transparent: true,
  depthTest: false,
  extensions: { derivatives: true },
  uniforms: {
    uCoeffs0: { value: new THREE.Vector4(0, 0, 0, 0) },
    uCoeffs1: { value: new THREE.Vector4(0, 0, 0, 0) },
    uTMin:    { value: 0.0 },
    uTMax:    { value: 1.0 },
    uAspect:  { value: HEIGHT_MAX / GRID_X },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform vec4  uCoeffs0;
    uniform vec4  uCoeffs1;
    uniform float uTMin;
    uniform float uTMax;
    uniform float uAspect;
    varying vec2  vUv;

    float evalPoly(float x) {
      float x2 = x  * x;
      float x3 = x2 * x;
      float x4 = x3 * x;
      float x5 = x4 * x;
      float x6 = x5 * x;
      float x7 = x6 * x;
      return uCoeffs0[0]
           + uCoeffs0[1] * x
           + uCoeffs0[2] * x2
           + uCoeffs0[3] * x3
           + uCoeffs1[0] * x4
           + uCoeffs1[1] * x5
           + uCoeffs1[2] * x6
           + uCoeffs1[3] * x7;
    }

    void main() {
      // U [0,1] -> hour index [0,7],  V [0,1] -> temp [tMin,tMax]
      float temp   = evalPoly(vUv.x * 7.0);
      float vCurve = (temp - uTMin) / (uTMax - uTMin);

      float dist  = abs(vUv.y - vCurve);
      float fw    = fwidth(vUv.y) * 2.0 * uAspect;
      float curve = pow(1.0 - smoothstep(0.0, fw, dist), 5.0);

      // Horizontal reference grid every 25% of height range
      float gridFw   = fwidth(vUv.y) * uAspect;
      float fracY    = mod(vUv.y, 0.125);
      float gridDist = min(fracY, 0.125 - fracY);

      // Horizontal reference grid every 25% of height range
      float gridFh   = fwidth(vUv.x) * uAspect;
      float fracX    = mod(vUv.x, 0.25);
      float gridDistx = min(fracX, 0.25 - fracX);

      float grid     = (1.0 - smoothstep(0.0, gridFw * 0.5, gridDist)) * 0.3 + (1.0 - smoothstep(0.0, gridFh * 0.5, gridDistx)) * 0.3 ;

      vec3 col = mix(vec3(1.0, 1.0, 1.0), vec3(1.0), curve);
      gl_FragColor = vec4(col, max(curve, grid));
    }
  `,
});

const curvePlane = new THREE.Mesh(
  new THREE.PlaneGeometry(GRID_X, HEIGHT_MAX),
  curveMat
);
curvePlane.visible     = false;
curvePlane.renderOrder = 999;
scene.add(curvePlane);

function updateCurve(zi) {
  const temps = Array.from({ length: GRID_X }, (_, xi) => grid[xi][zi]);
  const { xs, ys } = densePoints(temps, 64);

  // capture current uniforms as the "from" state for the transition
  const u = curveMat.uniforms;
  coeffsFrom = [
    u.uCoeffs0.value.x, u.uCoeffs0.value.y, u.uCoeffs0.value.z, u.uCoeffs0.value.w,
    u.uCoeffs1.value.x, u.uCoeffs1.value.y, u.uCoeffs1.value.z, u.uCoeffs1.value.w,
  ];
  coeffsTo        = polyfit(xs, ys, 7);
  coeffTransStart = clock.getElapsedTime();

  u.uTMin.value = tMin;
  u.uTMax.value = tMax;

  curvePlane.position.set(CX, HEIGHT_MAX / 2, (zi + 1) * CELL_Z + 0.2);
  curvePlane.visible = true;
}

// ── Animation state ───────────────────────────────────────────────────────────
let animStartTime  = null;
const ANIM_STAGGER = 3.0;   // seconds of wave stagger (back → front)
const ANIM_RISE    = 0.5;   // seconds each cube spends rising

let coeffsFrom      = new Array(8).fill(0);
let coeffsTo        = new Array(8).fill(0);
let coeffTransStart = null;
const COEFF_TRANS   = 0.2;  // seconds for curve coefficient interpolation

function cubicSmooth(t) { return t * t * (3 - 2 * t); }

// ── Selection state ───────────────────────────────────────────────────────────
const cubes      = [];
const cubesByDay = new Map();
let selectedCube = null;
let hoverDay     = -1;

const sidebar = document.getElementById('sidebar');
const legend  = document.getElementById('legend');

function openSidebar(cube) {
  const { month, day, hour, temp } = cube.userData;
  document.getElementById('sb-month').textContent = month;
  document.getElementById('sb-day').textContent   = day;
  document.getElementById('sb-hour').textContent  = hour;
  document.getElementById('sb-temp').textContent  = `${temp.toFixed(1)} °C`;
  sidebar.classList.add('open');
  legend.classList.add('shifted');
}

function closeSidebar() {
  sidebar.classList.remove('open');
  legend.classList.remove('shifted');
}

// ── Hover detection ───────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const ptrNDC    = new THREE.Vector2();
const tooltip   = document.getElementById('tooltip');

function showTooltip(cube, x, y) {
  const { month, day, hour, temp } = cube.userData;
  tooltip.innerHTML =
    `<b>${month} ${day}</b><br>${hour}&nbsp;&nbsp;${temp.toFixed(1)} °C`;
  // keep tooltip inside viewport
  const tx = x + 16;
  const ty = y - 10;
  tooltip.style.left = `${tx}px`;
  tooltip.style.top  = `${ty}px`;
  tooltip.classList.add('visible');
}

function hideTooltip() {
  tooltip.classList.remove('visible');
}

let dragOnCube = false;
const activePointers = new Set();

renderer.domElement.addEventListener('pointerdown', e => {
  activePointers.add(e.pointerId);

  if (activePointers.size >= 2) {
    controls.enabled = true;
    dragOnCube = false;
    return;
  }

  ptrNDC.set(
    (e.clientX / window.innerWidth)  * 2 - 1,
   -(e.clientY / window.innerHeight) * 2 + 1
  );
  raycaster.setFromCamera(ptrNDC, camera);
  dragOnCube = raycaster.intersectObjects(cubes).length > 0;
  if (dragOnCube) controls.enabled = false;
});

renderer.domElement.addEventListener('pointerup', e => {
  activePointers.delete(e.pointerId);
  if (activePointers.size === 0) { controls.enabled = true; dragOnCube = false; }
});
renderer.domElement.addEventListener('pointercancel', e => {
  activePointers.delete(e.pointerId);
  controls.enabled = true;
  dragOnCube = false;
});

renderer.domElement.addEventListener('pointermove', e => {
  ptrNDC.set(
    (e.clientX / window.innerWidth)  * 2 - 1,
   -(e.clientY / window.innerHeight) * 2 + 1
  );
  raycaster.setFromCamera(ptrNDC, camera);
  const hits = raycaster.intersectObjects(cubes);
  const hit  = hits.length > 0 ? hits[0].object : null;

  if (hit !== selectedCube) {
    const newDay = hit ? hit.userData.zi : -1;
    if (newDay !== hoverDay) {
      if (hoverDay >= 0) for (const c of (cubesByDay.get(hoverDay) ?? [])) c.userData.targetT = 0;
      if (newDay  >= 0) for (const c of (cubesByDay.get(newDay)   ?? [])) c.userData.targetT = 1;
      hoverDay = newDay;
    }
    selectedCube = hit;
    if (hit) {
      openSidebar(hit);
      updateCurve(hit.userData.zi);
    } else {
      closeSidebar();
    }
  }

  if (hit) {
    showTooltip(hit, e.clientX, e.clientY);
  } else {
    hideTooltip();
  }
});

// ── Build chart ───────────────────────────────────────────────────────────────
async function buildChart() {
  let text;
  try {
    const resp = await fetch('data/weather.csv');
    if (!resp.ok) throw new Error(resp.statusText);
    text = await resp.text();
  } catch {
    document.getElementById('error').classList.add('visible');
    return;
  }

  const rows  = parseCSV(text);
  grid        = buildGrid(rows);

  const allTemps = grid.flat().filter(v => v !== null);
  tMin = Math.min(...allTemps);
  tMax = Math.max(...allTemps);

  document.getElementById('temp-max').textContent = `${tMax.toFixed(1)} °C`;
  document.getElementById('temp-min').textContent = `${tMin.toFixed(1)} °C`;

  for (let xi = 0; xi < GRID_X; xi++) {
    for (let zi = 0; zi < GRID_Z; zi++) {
      const temp = grid[xi][zi];
      if (temp === null) continue; // empty slot — no data

      const n   = (tMax - tMin) > 0 ? (temp - tMin) / (tMax - tMin) : 0.5;
      const h   = HEIGHT_MIN + n * (HEIGHT_MAX - HEIGHT_MIN);

      const geo = new THREE.BoxGeometry(BAR_GAP, h, BAR_Z);
      geo.translate(0, h / 2, 0);

      const baseColor = tempColor(n);
      const mat = new THREE.MeshStandardMaterial({
        color:     baseColor.clone(),
        roughness: 0.55,
        metalness: 0.15,
      });

      const cube = new THREE.Mesh(geo, mat);
      cube.position.set(xi + 0.5, 0, zi * CELL_Z + CELL_Z / 2);

      // find which month this day belongs to
      let mi = 7;
      for (let m = 0; m < 7; m++) { if (zi < MONTH_OFFSETS[m + 1]) { mi = m; break; } }
      const dayOfMonth = zi - MONTH_OFFSETS[mi] + 1;

      cube.userData = {
        month:     MONTH_LABELS[mi],
        day:       `${dayOfMonth}`,
        hour:      HOUR_LABELS[xi],
        temp,
        zi,
        baseColor: baseColor.clone(),
        colorT:  0,
        targetT: 0,
      };

      cube.scale.y = 0;
      scene.add(cube);
      cubes.push(cube);
      if (!cubesByDay.has(zi)) cubesByDay.set(zi, []);
      cubesByDay.get(zi).push(cube);
    }

    // Hour labels below the grid (near side)
    const hl = makeSprite(HOUR_LABELS[xi]);
    hl.position.set(xi + 0.5, 0.15, GRID_Z * CELL_Z + 0.8);
    scene.add(hl);
  }

  // Month labels — centred on each month's day span
  for (let mi = 0; mi < 8; mi++) {
    const ml = makeSprite(MONTH_LABELS[mi]);
    ml.position.set(-0.8, 0.15, (MONTH_OFFSETS[mi] + MONTH_NDAYS[mi] / 2) * CELL_Z);
    scene.add(ml);
  }
}

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  const a = window.innerWidth / window.innerHeight;
  camera.left   = -VIEW_HALF * a;
  camera.right  =  VIEW_HALF * a;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Render loop ───────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  const now = clock.getElapsedTime();

  // ── Load animation: cubes rise back → front ──────────────────────────────
  if (animStartTime !== null) {
    const elapsed = now - animStartTime;
    for (const cube of cubes) {
      const delay  = cubicSmooth(1 - cube.userData.zi / (GRID_Z - 1)) * ANIM_STAGGER;
      const t      = Math.max(0, Math.min(1, (elapsed - delay) / ANIM_RISE));
      cube.scale.y = cubicSmooth(t);
    }
    if (elapsed >= ANIM_STAGGER + ANIM_RISE) {
      for (const cube of cubes) cube.scale.y = 1;
      animStartTime = null;
    }
  }

  // ── Curve coefficient transition ─────────────────────────────────────────
  if (coeffTransStart !== null) {
    const t = Math.min(1, (now - coeffTransStart) / COEFF_TRANS);
    const e = cubicSmooth(t);
    const c = coeffsFrom.map((f, i) => f + (coeffsTo[i] - f) * e);
    curveMat.uniforms.uCoeffs0.value.set(c[0], c[1], c[2], c[3]);
    curveMat.uniforms.uCoeffs1.value.set(c[4], c[5], c[6], c[7]);
    if (t >= 1) coeffTransStart = null;
  }

  // ── Hover highlight colour lerp ──────────────────────────────────────────
  for (const cube of cubes) {
    const d = cube.userData;
    if (Math.abs(d.colorT - d.targetT) > 0.001) {
      d.colorT += (d.targetT - d.colorT) * 0.1;
      cube.material.color.copy(d.baseColor).lerp(COLOR_WHITE, d.colorT * 0.45);
    }
  }

  controls.update();
  renderer.render(scene, camera);
}

buildChart().then(() => {
  animStartTime = clock.getElapsedTime();
  animate();
});
</script>
</body>
